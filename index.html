<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Odyssey Movie Time</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#041132;
padding:15px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.ticket{

width:100%;
max-width:430px;
background:#fff;
border-radius:30px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.4);

}

.top{

background:#ff2f52;
color:white;
padding:18px;
text-align:center;
font-size:30px;
font-weight:bold;

}

.poster{

width:100%;
height:320px;
object-fit:cover;

}

.details{

padding:25px;

}

.row{

display:flex;
align-items:center;
padding:18px 0;
border-bottom:1px solid #eee;
font-size:22px;

}

.icon{

width:45px;
font-size:25px;

}

.virtual{

margin-top:25px;
background:#ff2f52;
padding:18px;
border-radius:20px;
text-align:center;
font-size:25px;
font-weight:bold;
color:white;

}

.qr{

text-align:center;
margin-top:25px;

}

.qr img{

width:170px;

}

.verify{

margin-top:15px;
font-size:18px;
color:green;
font-weight:bold;
text-align:center;

}

.bottom{

background:#041132;
color:white;
padding:20px;
text-align:center;
font-size:20px;

}

</style>

</head>

<body>

<div class="ticket">

<div class="top">

🎬 Odyssey Movie Time

</div>

<img src="movie-ticket.jpg.PNG"
class="poster">

<div class="details">

<div class="row">

<div class="icon">📅</div>
29 May 2026

</div>

<div class="row">

<div class="icon">🕒</div>
8:45 AM

</div>

<div class="row">

<div class="icon">🎥</div>
Swapped

</div>

<div class="row">

<div class="icon">📍</div>
School Auditorium

</div>

<div class="virtual">

🎟 Virtual Ticket

</div>

<div class="qr">

<h3>SCAN AT ENTRY</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=OdysseyMovieTime">

</div>

<div class="verify">

✅ VERIFIED TICKET

</div>

</div>

<div class="bottom">

🍿 Let's Watch, Laugh & Have Fun!

</div>

</div>

</body>
</html>
