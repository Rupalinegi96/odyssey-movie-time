<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Odyssey Movie Time</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#041132;
padding:15px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.ticket{
width:100%;
max-width:430px;
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.top{
background:#ff2f52;
color:white;
padding:22px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.poster{
width:100%;
height:auto;
max-height:650px;
display:block;
}

.details{
padding:20px;
}

.row{
display:flex;
align-items:center;
gap:15px;
padding:18px 0;
border-bottom:1px solid #eee;
font-size:22px;
}

.icon{
font-size:28px;
width:40px;
}

.virtual{
margin-top:20px;
background:#ff2f52;
padding:18px;
border-radius:18px;
text-align:center;
font-size:24px;
font-weight:bold;
color:white;
}

.qr{
margin-top:25px;
text-align:center;
}

.qr img{
width:150px;
height:150px;
}

.verify{
margin-top:15px;
text-align:center;
font-size:18px;
color:green;
font-weight:bold;
}

.bottom{
background:#041132;
padding:18px;
color:white;
font-size:20px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="ticket">

<div class="top">
🎬 Odyssey Movie Time
</div>

<img class="poster"
src="https://raw.githubusercontent.com/Rupalinegi96/odyssey-movie-time/main/movie-ticket.jpg.PNG">

<div class="details">

<div class="row">
<div class="icon">📅</div>
29 May 2026
</div>

<div class="row">
<div class="icon">🕒</div>
8:45 AM
</div>

<div class="row">
<div class="icon">🎥</div>
Swapped
</div>

<div class="row">
<div class="icon">📍</div>
School Auditorium
</div>

<div class="virtual">
🎟 Virtual Ticket
</div>

<div class="qr">
<h3>SCAN AT ENTRY</h3>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=OdysseyMovieTime">

</div>

<div class="verify">
✅ VERIFIED TICKET
</div>

</div>

<div class="bottom">
🍿 Let's Watch, Laugh & Have Fun!
</div>

</div>

</body>
</html>
